<h2 mat-dialog-title>Neuer Beringer</h2>
<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Vorname</mat-label>
      <input matInput formControlName="first_name" autocomplete="off" />
      <mat-error>Vorname ist erforderlich.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nachname</mat-label>
      <input matInput formControlName="last_name" autocomplete="off" />
      <mat-error>Nachname ist erforderlich.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Kürzel</mat-label>
      <input matInput formControlName="handle" autocomplete="off" />
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Abbrechen</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Anlegen</button>
  </mat-dialog-actions>
</form>
