<h2 mat-dialog-title>Tot-Fund erfassen</h2>
<form [formGroup]="form" (ngSubmit)="confirm()">
  <mat-dialog-content>
    <p class="tot-fund-dialog__note">
      Der Vogel bleibt mit echter Art und echtem Ring erfasst. Bitte die
      Todesumstände angeben — sie werden in die Bemerkung übernommen.
    </p>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Todesumstände</mat-label>
      <textarea
        matInput
        formControlName="umstaende"
        rows="3"
        autocomplete="off"
        data-testid="tot-fund-umstaende"
      ></textarea>
      <mat-error>Die Todesumstände sind erforderlich.</mat-error>
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Abbrechen</button>
    <button
      mat-flat-button
      color="primary"
      type="submit"
      data-testid="tot-fund-confirm"
      [disabled]="form.invalid"
    >
      Tot-Fund übernehmen
    </button>
  </mat-dialog-actions>
</form>
