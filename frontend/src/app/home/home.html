<section class="home">
  <header class="home__header">
    <div class="home__title">
      <h1>Projekte</h1>
      <p class="home__subhead">Wähle ein Projekt, um mit der Dateneingabe zu beginnen.</p>
    </div>
    <button mat-flat-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon>
      Neues Projekt
    </button>
  </header>

  @if (loading()) {
    <mat-spinner diameter="32"></mat-spinner>
  } @else if (projects().length === 0) {
    <div class="home__empty">
      <img
        src="/birddoc-logo-1930x1930.png"
        alt=""
        aria-hidden="true"
        class="home__empty-logo"
        width="96" height="96" />
      <p>Du bist noch keinem Projekt zugeordnet. Lege ein neues Projekt an, um mit der Dateneingabe zu beginnen.</p>
    </div>
  } @else {
    <div class="home__list">
      @for (project of projects(); track project.id) {
        <div class="project-card">
          <button type="button" class="project-card__main" (click)="selectProject(project)">
            <span class="project-card__title">{{ project.title }}</span>
            <span class="project-card__org">{{ project.organization.name }}</span>
            @if (project.description) {
              <span class="project-card__desc">{{ project.description }}</span>
            }
          </button>
          <div class="project-card__actions">
            <button
              mat-icon-button
              type="button"
              aria-label="Als IWM Excel exportieren"
              title="Als IWM Excel exportieren"
              (click)="exportIwm(project, $event)">
              <mat-icon>download</mat-icon>
            </button>
            <button
              mat-icon-button
              type="button"
              aria-label="Projekt bearbeiten"
              (click)="openEditDialog(project, $event)">
              <mat-icon>edit</mat-icon>
            </button>
          </div>
        </div>
      }
    </div>
  }
</section>
