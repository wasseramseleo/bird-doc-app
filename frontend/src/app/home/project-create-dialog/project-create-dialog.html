<h2 mat-dialog-title>Neues Projekt</h2>
<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Titel</mat-label>
      <input matInput formControlName="title" autocomplete="off" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Beschreibung (optional)</mat-label>
      <textarea matInput rows="3" formControlName="description"></textarea>
    </mat-form-field>

    @if (showOrganizationPicker) {
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Organisation</mat-label>
        <mat-select formControlName="organizationHandle">
          @for (org of data.organizations; track org.handle) {
            <mat-option [value]="org.handle">{{ org.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    }
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Abbrechen</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Anlegen</button>
  </mat-dialog-actions>
</form>
