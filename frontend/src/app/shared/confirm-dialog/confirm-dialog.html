<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">{{ data.cancelLabel ?? 'Abbrechen' }}</button>
  <button mat-flat-button color="primary" type="button" (click)="confirm()">
    {{ data.confirmLabel ?? 'Bestätigen' }}
  </button>
</mat-dialog-actions>
