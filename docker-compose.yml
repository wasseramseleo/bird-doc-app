services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: birddoc
      POSTGRES_USER: birddoc
      POSTGRES_PASSWORD: birddoc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birddoc -d birddoc"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      target: builder
    command: uv run python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SECRET_KEY: dev-insecure-not-for-production
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://birddoc:birddoc@db:5432/birddoc
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      CSRF_TRUSTED_ORIGINS: http://localhost:4200
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: builder
    command: npm start -- --host 0.0.0.0 --poll 2000
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pgdata:
  backend_venv:
  frontend_node_modules:
